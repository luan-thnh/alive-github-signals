<svg width="250" height="72" viewBox="0 0 250 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TIKTOK</title>
  <desc id="desc">TIKTOK Alive Interface social button</desc>
  
  <defs>
    <pattern id="alive-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#F3F0EA" stroke-opacity=".035"/>
    </pattern>
    <linearGradient id="alive-accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#C8FF4D"/>
      <stop offset="1" stop-color="#F3F0EA" stop-opacity=".22"/>
    </linearGradient>
    <radialGradient id="alive-aura">
      <stop stop-color="#C8FF4D" stop-opacity=".28"/>
      <stop offset="1" stop-color="#C8FF4D" stop-opacity="0"/>
    </radialGradient>
    <filter id="alive-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .display { font-family: Arial Narrow, Helvetica Neue, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .label { fill:#94978F; font-size:11px; letter-spacing:1.45px; }
      .micro { fill:#565B56; font-size:9px; letter-spacing:1.15px; }
      .section { fill:#F3F0EA; font-size:14px; font-weight:700; letter-spacing:2.3px; }
      .accent { fill:#C8FF4D; }
      .text { fill:#F3F0EA; }
      
      @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
      @keyframes scan { from{transform:translateX(-35%)} to{transform:translateX(135%)} }
      @keyframes blink { 0%,45%{opacity:1} 46%,100%{opacity:0} }
      @keyframes drift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
      .pulse { animation:pulse 2.2s ease-in-out infinite; }
      .scan { animation:scan 5s linear infinite; }
      .blink { animation:blink 1.1s steps(1,end) infinite; }
      .drift { animation:drift 4s ease-in-out infinite; }
      
    </style>
  </defs>
  <rect width="250" height="72" fill="#090B0E"/>
  <rect width="250" height="72" fill="url(#alive-grid)"/>
  
    <rect x="1" y="1" width="248" height="70" fill="#0D1013" stroke="#2B302D"/>
    <rect x="1" y="1" width="6" height="70" fill="#C8FF4D"/>
    <rect x="14" y="14" width="44" height="44" fill="#090B0E" stroke="#2B302D"/>
    
    <g transform="translate(19 19)">
      
      <g transform="scale(1.4166666666666667)">
    <path d="M13 4V15.4C13 17.8 11.1 19.7 8.7 19.7C6.4 19.7 4.5 17.9 4.5 15.6C4.5 13.2 6.5 11.3 8.9 11.3C9.4 11.3 9.8 11.4 10.2 11.5V14.4C9.9 14.2 9.5 14.1 9.1 14.1C8.2 14.1 7.4 14.8 7.4 15.7C7.4 16.6 8.1 17.3 9 17.3C10 17.3 10.7 16.5 10.7 15.5V4H13Z" fill="#C8FF4D"/>
    <path d="M13 5C14.2 7.4 16 8.7 19 8.9V11.8C16.5 11.6 14.4 10.6 13 9.2" stroke="#C8FF4D" stroke-width="1.7"/>
  </g>
    </g>
  
    <line x1="68" y1="10" x2="68" y2="62" stroke="#2B302D"/>
    <text x="84" y="29" class="mono text" font-size="11" font-weight="700" letter-spacing="1.5">TIKTOK</text>
    <text x="84" y="48" class="mono micro">@luanthnh</text>
    <circle cx="207" cy="36" r="3" fill="#C8FF4D" class="pulse"/>
    <path d="M220 36H236M230 30L236 36L230 42" stroke="#C8FF4D"/>
  
</svg>