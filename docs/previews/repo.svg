<svg width="720" height="310" viewBox="0 0 720 310" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">luan-thnh/alive-github-signals</title>
  <desc id="desc">Repository card for luan-thnh/alive-github-signals</desc>
  
  <defs>
    <pattern id="alive-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#F3F0EA" stroke-opacity=".035"/>
    </pattern>
    <linearGradient id="alive-accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#C8FF4D"/>
      <stop offset="1" stop-color="#F3F0EA" stop-opacity=".22"/>
    </linearGradient>
    <radialGradient id="alive-aura">
      <stop stop-color="#C8FF4D" stop-opacity=".28"/>
      <stop offset="1" stop-color="#C8FF4D" stop-opacity="0"/>
    </radialGradient>
    <filter id="alive-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .display { font-family: Arial Narrow, Helvetica Neue, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .label { fill:#94978F; font-size:11px; letter-spacing:1.45px; }
      .micro { fill:#565B56; font-size:9px; letter-spacing:1.15px; }
      .section { fill:#F3F0EA; font-size:14px; font-weight:700; letter-spacing:2.3px; }
      .accent { fill:#C8FF4D; }
      .text { fill:#F3F0EA; }
      
    </style>
  </defs>
  <rect width="720" height="310" fill="#090B0E"/>
  <rect width="720" height="310" fill="url(#alive-grid)"/>
  
    
  <rect x="14" y="14" width="692" height="282" fill="none" stroke="#2B302D"/>
  <path d="M14 32V14H32 M688 14H706V32 M14 278V296H32 M688 296H706V278" stroke="#C8FF4D" stroke-width="1.5"/>

    
  <text x="36" y="48" class="mono section">03 / REPOSITORY SPECIMEN</text>
  <line x1="36" y1="70" x2="684" y2="70" stroke="#2B302D"/>
  <circle cx="550" cy="43" r="4" fill="#C8FF4D" filter="url(#alive-glow)" class="pulse"/>
  <text x="564" y="47" class="mono micro">UPDATED / 2026-07-22</text>

    <text x="38" y="113" class="mono accent" font-size="11" letter-spacing="1.6">LUAN-THNH / PUBLIC SYSTEM</text>
    <text x="36" y="158" class="display text" font-size="40" font-weight="780" letter-spacing="-1.5">alive-github-signals</text>
    <text x="38" y="190" class="mono label">Dynamic GitHub data rendered as expressive SVG badges, cards and living interface signals.</text>
    <line x1="38" y1="214" x2="682" y2="214" stroke="#2B302D"/>
    
  <text x="38" y="254" class="display" fill="#F3F0EA" font-size="32" font-weight="750" letter-spacing="-1">128</text>
  <text x="38" y="277" class="mono micro">STARS</text>

    
  <text x="150" y="254" class="display" fill="#F3F0EA" font-size="32" font-weight="750" letter-spacing="-1">18</text>
  <text x="150" y="277" class="mono micro">FORKS</text>

    
  <text x="262" y="254" class="display" fill="#F3F0EA" font-size="32" font-weight="750" letter-spacing="-1">4</text>
  <text x="262" y="277" class="mono micro">OPEN ISSUES</text>

    <line x1="450" y1="230" x2="450" y2="276" stroke="#2B302D"/>
    <text x="478" y="247" class="mono micro">PRIMARY MATERIAL</text>
    <text x="478" y="276" class="display text" font-size="24" font-weight="700">TypeScript</text>
    <circle cx="678" cy="268" r="8" fill="#C8FF4D" filter="url(#alive-glow)" class="pulse"/>
    <path d="M622 268H665" stroke="#C8FF4D"/>
  
</svg>