<svg width="760" height="340" viewBox="0 0 760 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">luan-thnh / activity signal</title>
  <desc id="desc">Orbital GitHub statistics card</desc>
  
  <defs>
    <pattern id="alive-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#D7E5FF" stroke-opacity=".035"/>
    </pattern>
    <linearGradient id="alive-accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#5DE1FF"/>
      <stop offset="1" stop-color="#7B7DFF" stop-opacity=".22"/>
    </linearGradient>
    <radialGradient id="alive-aura">
      <stop stop-color="#5DE1FF" stop-opacity=".28"/>
      <stop offset="1" stop-color="#5DE1FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="alive-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .display { font-family: Arial Narrow, Helvetica Neue, Arial, sans-serif; }
