      .section { fill:#F0F5FF; font-size:14px; font-weight:700; letter-spacing:2.3px; }
      .accent { fill:#5DE1FF; }
      .text { fill:#F0F5FF; }
      
    </style>
  </defs>
  <rect width="760" height="340" fill="#080B12"/>
  <rect width="760" height="340" fill="url(#alive-grid)"/>
  
      
