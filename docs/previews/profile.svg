  <line x1="36" y1="70" x2="744" y2="70" stroke="#2B302D"/>
  <circle cx="610" cy="43" r="4" fill="#C8FF4D" filter="url(#alive-glow)" class="pulse"/>
  <text x="624" y="47" class="mono micro">LIVE / GITHUB API</text>

