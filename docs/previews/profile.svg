    <text x="190" y="132" class="mono accent" font-size="11" letter-spacing="1.8">@LUAN-THNH</text>
    <text x="188" y="177" class="display text" font-size="42" font-weight="800" letter-spacing="-1.7">luanthnh</text>
    <text x="190" y="208" class="mono label">Creative frontend developer building expressive interfaces and practical automation.</text>
    <line x1="46" y1="252" x2="734" y2="252" stroke="#2B302D"/>
    
  <text x="46" y="298" class="display" fill="#F3F0EA" font-size="32" font-weight="750" letter-spacing="-1">18</text>
  <text x="46" y="321" class="mono micro">FOLLOWERS</text>

    
  <text x="178" y="298" class="display" fill="#F3F0EA" font-size="32" font-weight="750" letter-spacing="-1">48</text>
