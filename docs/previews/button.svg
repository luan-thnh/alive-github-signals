<svg width="190" height="46" viewBox="0 0 190 46" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">VIEW SYSTEM</title>
  <desc id="desc">Alive Interface button artwork</desc>
  
  <defs>
    <pattern id="alive-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#F3F0EA" stroke-opacity=".035"/>
    </pattern>
    <linearGradient id="alive-accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#C8FF4D"/>
      <stop offset="1" stop-color="#F3F0EA" stop-opacity=".22"/>
    </linearGradient>
    <radialGradient id="alive-aura">
      <stop stop-color="#C8FF4D" stop-opacity=".28"/>
      <stop offset="1" stop-color="#C8FF4D" stop-opacity="0"/>
    </radialGradient>
    <filter id="alive-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .display { font-family: Arial Narrow, Helvetica Neue, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .label { fill:#94978F; font-size:11px; letter-spacing:1.45px; }
      .micro { fill:#565B56; font-size:9px; letter-spacing:1.15px; }
      .section { fill:#F3F0EA; font-size:14px; font-weight:700; letter-spacing:2.3px; }
      .accent { fill:#C8FF4D; }
      .text { fill:#F3F0EA; }
      
    </style>
  </defs>
  <rect width="190" height="46" fill="#090B0E"/>
  <rect width="190" height="46" fill="url(#alive-grid)"/>
  
    <path d="M12 1H189V34L178 45H1V12Z" fill="#0D1013" stroke="#2B302D"/>
    <rect x="1" y="1" width="7" height="44" fill="#C8FF4D"/>
    <text x="24" y="29" class="mono text" font-size="12" font-weight="700" letter-spacing="1.4">VIEW SYSTEM</text>
    <line x1="134" y1="10" x2="134" y2="36" stroke="#2B302D"/>
    <text x="161" y="29" text-anchor="middle" class="mono accent" font-size="14">↗</text>
  
</svg>