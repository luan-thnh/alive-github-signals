<svg width="760" height="370" viewBox="0 0 760 370" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">luan-thnh / terminal</title>
  <desc id="desc">GitHub developer terminal card</desc>
  
  <defs>
    <pattern id="alive-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#F3F0EA" stroke-opacity=".035"/>
    </pattern>
    <linearGradient id="alive-accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#C8FF4D"/>
      <stop offset="1" stop-color="#F3F0EA" stop-opacity=".22"/>
    </linearGradient>
    <radialGradient id="alive-aura">
      <stop stop-color="#C8FF4D" stop-opacity=".28"/>
      <stop offset="1" stop-color="#C8FF4D" stop-opacity="0"/>
    </radialGradient>
    <filter id="alive-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .display { font-family: Arial Narrow, Helvetica Neue, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .label { fill:#94978F; font-size:11px; letter-spacing:1.45px; }
      .micro { fill:#565B56; font-size:9px; letter-spacing:1.15px; }
      .section { fill:#F3F0EA; font-size:14px; font-weight:700; letter-spacing:2.3px; }
      .accent { fill:#C8FF4D; }
      .text { fill:#F3F0EA; }
      
      @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }
      @keyframes scan { from{transform:translateX(-35%)} to{transform:translateX(135%)} }
      @keyframes blink { 0%,45%{opacity:1} 46%,100%{opacity:0} }
      @keyframes drift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
      .pulse { animation:pulse 2.2s ease-in-out infinite; }
      .scan { animation:scan 5s linear infinite; }
      .blink { animation:blink 1.1s steps(1,end) infinite; }
      .drift { animation:drift 4s ease-in-out infinite; }
      
    </style>
  </defs>
  <rect width="760" height="370" fill="#090B0E"/>
  <rect width="760" height="370" fill="url(#alive-grid)"/>
  
    <rect x="14" y="14" width="732" height="342" fill="#0D1013" stroke="#2B302D"/>
    <rect x="14" y="14" width="732" height="46" fill="#14181A"/>
    <circle cx="38" cy="37" r="5" fill="#FF5D52"/>
    <circle cx="56" cy="37" r="5" fill="#FFB84D"/>
    <circle cx="74" cy="37" r="5" fill="#C8FF4D"/>
    <text x="380" y="41" text-anchor="middle" class="mono micro">ALIVE://GITHUB/LUAN-THNH</text>
    <text x="38" y="99" class="mono micro">01</text>
    <text x="76" y="99" class="mono text" font-size="13"><tspan fill="#C8FF4D">const</tspan> developer = {</text>
    <text x="38" y="131" class="mono micro">02</text>
    <text x="94" y="131" class="mono text" font-size="13"><tspan fill="#F3F0EA">login</tspan>: <tspan fill="#C8FF4D">"luan-thnh"</tspan>,</text>
    <text x="38" y="163" class="mono micro">03</text>
    <text x="94" y="163" class="mono text" font-size="13"><tspan fill="#F3F0EA">commits</tspan>: <tspan fill="#C8FF4D">340</tspan>,</text>
    <text x="38" y="195" class="mono micro">04</text>
    <text x="94" y="195" class="mono text" font-size="13"><tspan fill="#F3F0EA">primaryMaterial</tspan>: <tspan fill="#C8FF4D">"TypeScript"</tspan>,</text>
    <text x="38" y="227" class="mono micro">05</text>
    <text x="94" y="227" class="mono text" font-size="13"><tspan fill="#F3F0EA">streak</tspan>: <tspan fill="#C8FF4D">4</tspan>,</text>
    <text x="38" y="259" class="mono micro">06</text>
    <text x="76" y="259" class="mono text" font-size="13">};</text>
    <rect x="38" y="290" width="684" height="48" fill="#090B0E" stroke="#2B302D"/>
    <text x="58" y="320" class="mono accent" font-size="13">&gt;</text>
    <text x="82" y="320" class="mono label">npm run ship:meaningful-systems</text>
    <rect x="682" y="305" width="9" height="17" fill="#C8FF4D" class="blink"/>
  
</svg>