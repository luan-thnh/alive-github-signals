<svg width="150" height="34" viewBox="0 0 150 34" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">COMMITS: 340</title>
  <desc id="desc">Alive Interface badge</desc>
  
  <defs>
    <pattern id="alive-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" stroke="#F3F0EA" stroke-opacity=".035"/>
    </pattern>
    <linearGradient id="alive-accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#C8FF4D"/>
      <stop offset="1" stop-color="#F3F0EA" stop-opacity=".22"/>
    </linearGradient>
    <radialGradient id="alive-aura">
      <stop stop-color="#C8FF4D" stop-opacity=".28"/>
      <stop offset="1" stop-color="#C8FF4D" stop-opacity="0"/>
    </radialGradient>
    <filter id="alive-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .display { font-family: Arial Narrow, Helvetica Neue, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .label { fill:#94978F; font-size:11px; letter-spacing:1.45px; }
      .micro { fill:#565B56; font-size:9px; letter-spacing:1.15px; }
      .section { fill:#F3F0EA; font-size:14px; font-weight:700; letter-spacing:2.3px; }
      .accent { fill:#C8FF4D; }
      .text { fill:#F3F0EA; }
      
    </style>
  </defs>
  <rect width="150" height="34" fill="#090B0E"/>
  <rect width="150" height="34" fill="url(#alive-grid)"/>
  
    <path d="M0 1H149V33H1V0Z" fill="#090B0E" stroke="#2B302D"/>
    <rect x="1" y="1" width="6" height="32" fill="#C8FF4D"/>
    <text x="18" y="22" class="mono label">COMMITS</text>
    <text x="136" y="22" text-anchor="end" class="mono accent" font-size="12" font-weight="700">340</text>
    <circle cx="102" cy="17" r="3" fill="#C8FF4D" class="pulse"/>
  
</svg>