      .section { fill:#FFF2EA; font-size:14px; font-weight:700; letter-spacing:2.3px; }
      .accent { fill:#FF6542; }
      .text { fill:#FFF2EA; }
      
    </style>
  </defs>
  <rect width="650" height="350" fill="#0E0908"/>
  <rect width="650" height="350" fill="url(#alive-grid)"/>
  
      
